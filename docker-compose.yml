version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: campusgrid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - campusgrid_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campusgrid"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/campusgrid?schema=public
      JWT_SECRET: change-this-in-production
      PORT: 4000
      # Comma-separated list of allowed CORS origins
      CORS_ORIGINS: http://localhost:80,http://localhost,http://localhost:5173
      FRONTEND_URL: http://localhost
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        # Vite bakes this URL into the bundle at build time
        VITE_API_URL: http://localhost:4000/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  campusgrid_db_data:
